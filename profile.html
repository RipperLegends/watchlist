<!doctype html>
<html lang="uk">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watchlist — Профіль</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#6366f1">
</head>

<body class="page-profile">
  <nav class="header-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><span class="nav-logo-mark">◐</span> Watchlist</a>
      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Головна</a>
        <a href="/catalog.html" class="nav-link">Каталог</a>
      </nav>
      <div class="nav-actions">
        <button class="btn btn-icon" id="btn-theme" title="Змінити тему">🌙</button>
        <div class="nav-auth" id="top-bar-auth"></div>
      </div>
    </div>
  </nav>

  <main class="container page-shell profile-shell">
    <section class="profile-card profile-hero-card">
      <div class="profile-cover" id="profile-cover" aria-hidden="true"></div>
      <div class="profile-card-main">
        <div class="profile-avatar profile-avatar-xl" id="profile-avatar">
          <span id="profile-initials">?</span>
        </div>
        <div class="profile-summary">
          <div class="profile-title-row">
            <p class="eyebrow" id="profile-eyebrow">Акаунт</p>
            <span id="profile-role-badge" class="badge badge-role-user">user</span>
          </div>
          <h1 id="profile-title">Профіль</h1>
          <div class="profile-name" id="profile-name-display">...</div>
          <div class="profile-email" id="profile-email-display">...</div>
          <p class="profile-bio" id="profile-bio"></p>
          <div class="profile-favorite-genres" id="profile-favorite-genres"></div>
        </div>
      </div>

      <div class="profile-actions-row">
        <a href="settings.html" class="btn btn-primary">Налаштування</a>
        <a href="friends.html" class="btn btn-secondary">Друзі</a>
        <a href="messages.html" class="btn btn-secondary">Повідомлення</a>
        <a href="admin.html" class="btn btn-secondary" id="profile-admin-link" hidden>Адмін панель</a>
      </div>
    </section>

    <section class="profile-insights-grid">
      <article class="profile-insight-card">
        <h2>Улюблені жанри</h2>
        <div id="profile-top-genres"></div>
      </article>
      <article class="profile-insight-card">
        <h2>Топ-оцінки</h2>
        <div id="profile-top-rated"></div>
      </article>
      <article class="profile-insight-card">
        <h2>Остання активність</h2>
        <div id="profile-recent-activity"></div>
      </article>
      <article class="profile-insight-card profile-insight-wide">
        <h2>Приватність</h2>
        <div id="profile-privacy"></div>
      </article>
    </section>
  </main>

  <div class="toast-container" id="toast-container"></div>
  <script src="js/auth.js"></script>
  <script src="js/parallax.js"></script>
  <script src="js/profile.js"></script>
</body>

</html>
