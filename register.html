<!doctype html>
<html lang="uk">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Watchlist — Реєстрація</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#6366f1">
</head>

<body class="page-auth page-register">
  <!-- Navigation bar -->
  <nav class="header-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo"><span class="nav-logo-mark">◐</span> Watchlist</a>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Головна</a>
        <a href="/catalog.html" class="nav-link">Каталог</a>
      </div>
      <div class="nav-actions">
        <button class="btn btn-icon" id="btn-theme" title="Змінити тему">🌙</button>
        <a href="login.html" class="nav-link">Вхід</a>
      </div>
    </div>
  </nav>

  <main class="auth-screen">
    <div class="auth-screen-noise"></div>
    <section class="auth-modal-shell">
      <div class="auth-card auth-card-modal" data-parallax>
        <a href="index.html" class="auth-dismiss" aria-label="Повернутися на головну">✕</a>
        <div class="auth-card-topline">
          <span class="auth-mark">◐</span>
          <span class="auth-mode-badge">Реєстрація</span>
        </div>
        <div class="auth-hero-copy">
          <h1>Створіть власний кінопростір</h1>
          <p>Після реєстрації ви зможете зберігати оцінки, вести чергу перегляду, тримати улюблене поруч і користуватися спільним режимом.</p>
        </div>

        <form id="register-form" class="auth-form-stack" data-auth-form="register">
          <div class="form-group auth-field-group">
            <label for="reg-username">Логін</label>
            <input type="text" id="reg-username" required placeholder="Оберіть логін" minlength="3" maxlength="32" autocomplete="username">
          </div>
          <div class="form-group auth-field-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" required placeholder="name@example.com" autocomplete="email">
          </div>
          <div class="form-group auth-field-group">
            <label for="reg-password">Пароль</label>
            <div class="auth-input-shell">
              <input type="password" id="reg-password" required placeholder="Мінімум 8 символів" minlength="8" autocomplete="new-password">
              <button type="button" class="auth-visibility-toggle" data-toggle-password="reg-password" aria-label="Показати або приховати пароль">◉</button>
            </div>
          </div>
          <div class="form-group auth-field-group">
            <label for="reg-password2">Підтвердження пароля</label>
            <div class="auth-input-shell">
              <input type="password" id="reg-password2" required placeholder="Повторіть пароль" autocomplete="new-password">
              <button type="button" class="auth-visibility-toggle" data-toggle-password="reg-password2" aria-label="Показати або приховати пароль">◉</button>
            </div>
          </div>

          <div class="form-actions auth-actions">
            <button type="submit" class="btn btn-primary auth-submit">Створити акаунт</button>
          </div>
          <p class="auth-link">Вже є акаунт? <a href="login.html">Увійти</a></p>
        </form>
      </div>
    </section>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/auth.js"></script>
  <script src="js/parallax.js"></script>
</body>

</html>
